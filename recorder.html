<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OmniTest CDN — Session Recorder</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<div class="app">
  <aside class="sidebar"></aside>

  <main class="main-content">
    <div class="page-header">
      <h1>Session Recorder</h1>
      <p>Record authenticated user journeys and analyze with AI</p>
    </div>

    <div class="panel">
      <div class="panel-header"><span class="panel-title">Recording Setup</span></div>
      <div class="panel-body">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;">
          <div class="form-group">
            <label class="form-label">Application URL</label>
            <input type="text" id="app-url" placeholder="https://ihcm.adp.com" value="https://ihcm.adp.com">
          </div>
          <div class="form-group">
            <label class="form-label">Session Name</label>
            <input type="text" id="session-name" placeholder="ADP_iHCM_Login_Flow">
          </div>
        </div>
        <div style="display:flex;gap:12px;flex-wrap:wrap;">
          <button id="start-btn" class="btn btn-primary">⏺ Start Recording</button>
          <button id="stop-btn" class="btn btn-secondary" disabled>⏹ Stop</button>
          <button id="export-btn" class="btn btn-ghost" disabled>↓ Export JSON</button>
          <button id="analyze-btn" class="btn btn-secondary" disabled>✦ AI Analyze</button>
        </div>
      </div>
    </div>

    <div class="recording-status" id="rec-status">
      <div class="rec-dot"></div>
      <span id="status-text">Ready to record</span>
    </div>

    <!-- AI Analysis output -->
    <div class="panel" style="display:none;" id="ai-panel-wrapper">
      <div class="ai-panel-header">
        <div class="ai-avatar">✦</div>
        <div><div class="ai-panel-title">AI Session Analysis</div><div class="ai-panel-subtitle">Performance insights</div></div>
      </div>
      <div class="panel-body" id="ai-analysis"></div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">Recorded API Calls</span>
        <span id="call-count" style="font-size:12px;color:var(--muted);font-family:var(--font-mono);">0 calls</span>
      </div>
      <div class="panel-body" style="padding:0;">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>#</th><th>Method</th><th>URL</th><th>Status</th><th>Duration</th><th>Phase</th>
              </tr>
            </thead>
            <tbody id="calls-body"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="/js/shared.js"></script>
<script src="/js/sidebar.js"></script>
<script>
  // Show AI panel when analyze button is clicked
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('analyze-btn')?.addEventListener('click', () => {
      document.getElementById('ai-panel-wrapper').style.display = 'block';
    });
    // Update call count
    const observer = new MutationObserver(() => {
      const rows = document.getElementById('calls-body')?.children.length || 0;
      const el = document.getElementById('call-count');
      if (el) el.textContent = `${rows} calls`;
    });
    const tbody = document.getElementById('calls-body');
    if (tbody) observer.observe(tbody, { childList: true });
  });
</script>
<script src="/js/recorder.js"></script>
</body>
</html>
